name: "[Platform] Structurize Sync Workflow"

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      sourceFolder:
        description: "Source folder path to sync (e.g. 'docs/architecture')"
        required: true
        type: string
      targetFolder:
        description: "Target sub-folder inside norconsult-digital/software-architecture (e.g. 'my-project')"
        required: true
        type: string

jobs:
  structurize-sync:
    uses: norconsult-digital/.github/.github/workflows/structurize-sync.yml@main
    with:
      sourceFolder: ${{ github.event.inputs.sourceFolder }}
      targetFolder: ${{ github.event.inputs.targetFolder }}
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
