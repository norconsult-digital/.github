name: "[Sample category] Structurize Sync Workflow"

permissions:
  contents: read

on:
  push:
    branches: ["main"]
    paths:
      # Keep this path in sync with the sourceFolder value below.
      - "docs/sample-source-folder/**"
  workflow_dispatch:

jobs:
  structurize-sync:
    uses: norconsult-digital/.github/.github/workflows/structurize-sync.yml@main
    with:
      # Optional: add a .structurize-syncignore file in this folder to exclude files from sync.
      # The ignore file uses rsync exclude syntax, which is similar to but not the same as .gitignore syntax.
      # Patterns are evaluated relative to sourceFolder.
      sourceFolder: docs/sample-source-folder
      # Use a dedicated target folder. The workflow mirrors this folder and may delete files inside it.
      # Existing non-empty target folders must contain a matching .structurize-sync-source marker.
      targetFolder: c4/sample-target-folder
      githubAppId: ${{ vars.STRUCTURIZE_SYNC_APP_ID }}
    secrets:
      STRUCTURIZE_SYNC_APP_PRIVATE_KEY: ${{ secrets.STRUCTURIZE_SYNC_APP_PRIVATE_KEY }}
