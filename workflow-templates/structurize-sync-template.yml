name: "[Platform] Structurize Sync Workflow"

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      sourceRepo:
        description: "Source repository (owner/repo)"
        required: true
        type: string
      sourceFolder:
        description: "Source folder path within the source repository (e.g. 'docs/architecture')"
        required: true
        type: string
      targetFolder:
        description: "Target sub-folder inside norconsult-digital/software-architecture (e.g. 'my-project')"
        required: true
        type: string
      sourceBranch:
        description: "Branch to check out from the source repository"
        required: false
        type: string
        default: "main"

jobs:
  structurize-sync:
    name: Sync files to software-architecture
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.sourceRepo }}
          ref: ${{ inputs.sourceBranch }}
          path: source-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: norconsult-digital/software-architecture
          path: target-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync files to target folder
        shell: bash
        run: |
          SOURCE_PATH="source-repo/${{ inputs.sourceFolder }}"
          TARGET_PATH="target-repo/${{ inputs.targetFolder }}"

          if [ ! -d "$SOURCE_PATH" ]; then
            echo "::error::Source folder '$SOURCE_PATH' does not exist."
            exit 1
          fi

          mkdir -p "$TARGET_PATH"
          rsync -av --delete "$SOURCE_PATH/" "$TARGET_PATH/"

      - name: Commit and push changes
        shell: bash
        working-directory: target-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync structurize files from ${{ inputs.sourceRepo }}/${{ inputs.sourceFolder }} into ${{ inputs.targetFolder }}"
            git push
          fi
