# ─────────────────────────────────────────────────────────────────────────────
# Unified Copilot Agent Review Workflow (Organization-Level)
# ─────────────────────────────────────────────────────────────────────────────
#
# Place this file in: norconsult-digital/.github/.github/workflows/copilot-agent-review.yml
#
# Auto-detects which agents to run based on changed files in the PR:
#   - *.cs files        → dotnet-security-reviewer + dotnet-runtime-safety-reviewer
#   - *.ts/tsx/html     → frontend-security-reviewer
#
# Repos opt in by creating a thin caller workflow (~10 lines).
# Repos can override agent selection and config via .github/agent-review.yml
#
# ─────────────────────────────────────────────────────────────────────────────
# CONVERGENCE MODEL ("ledger + revalidation-first")
# ─────────────────────────────────────────────────────────────────────────────
# The bot's PRIMARY job is CONTINUITY, not re-discovery. On every push it:
#   1. Loads the per-agent finding ledger (a hidden sticky PR comment).
#   2. Asks the model to RE-VALIDATE each existing open finding against the
#      current code (still-present | fixed | uncertain) BEFORE looking for new
#      issues. This is what stops the "new random subset every push" swing-door.
#   3. Posts ONLY genuinely-new findings (stable fingerprint, not line number).
#   4. Resolves a finding's thread ONLY when the model explicitly classifies it
#      as `fixed` — never merely because it was not emitted this run.
#
# Identity is owned by the workflow, not the model:
#   fingerprint = sha256(agent | ruleId | file | symbol | evidenceAnchor)
# Each inline comment carries a hidden `<!-- agent-fp:HASH -->` marker so the
# ledger is self-healing and dedup survives line shifts and reruns.
#
# Each agent writes its OWN ledger comment (namespaced by agent name), so the
# parallel matrix jobs never race on the same document.
# ─────────────────────────────────────────────────────────────────────────────

name: "Copilot Agent Review"

on:
  workflow_call:
    inputs:
      agents:
        description: >
          Optional JSON array of agent names to run. If omitted, the workflow
          auto-detects based on changed file extensions.
          Example: '["dotnet-security-reviewer", "frontend-security-reviewer"]'
          Valid values: "dotnet-security-reviewer", "dotnet-runtime-safety-reviewer", "frontend-security-reviewer"
        required: false
        type: string
        default: "auto"
    secrets:
      COPILOT_CLI_TOKEN:
        description: "GitHub token with Copilot CLI access"
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Phase 1: Detect which agents should run
  # ──────────────────────────────────────────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has-agents: ${{ steps.build-matrix.outputs.has-agents }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Detect agents to run
        id: build-matrix
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          git fetch --no-tags --depth=1 origin "$base" || true

          changed_files=$(git diff --name-only "$base" "$head")

          # Count file types
          cs_count=$(echo "$changed_files" | grep -cE '\.cs$' || true)
          ts_count=$(echo "$changed_files" | grep -cE '\.(ts|tsx|html)$' || true)
          # Exclude test/spec files from frontend count
          ts_test_count=$(echo "$changed_files" | grep -cE '\.(spec|test)\.(ts|tsx)$' || true)
          ts_src_count=$((ts_count - ts_test_count))

          echo "Changed files: cs=$cs_count, ts/html=$ts_src_count (tests excluded: $ts_test_count)"

          agents_input='${{ inputs.agents }}'

          if [ "$agents_input" != "auto" ] && [ -n "$agents_input" ]; then
              # Explicit agent list provided — use it directly
              echo "Using explicit agent list: $agents_input"
              matrix="$agents_input"
          else
              # Auto-detect based on changed files
              agents=()

              if [ "$cs_count" -gt 0 ]; then
                  agents+=("dotnet-security-reviewer")
                  agents+=("dotnet-runtime-safety-reviewer")
                  echo "Auto-detected: C# files → dotnet-security + runtime-safety"
              fi

              if [ "$ts_src_count" -gt 0 ]; then
                  agents+=("frontend-security-reviewer")
                  echo "Auto-detected: TS/HTML files → frontend-security"
              fi

              # Check for repo-level override config
              if [ -f ".github/agent-review.yml" ]; then
                  echo "Found .github/agent-review.yml — checking for disabled agents"
                  # Simple YAML parsing: look for "disabled:" lines
                  for agent in "${agents[@]}"; do
                      if grep -qE "^\s*-\s*${agent}\s*$" .github/agent-review.yml 2>/dev/null; then
                          echo "  Skipping disabled agent: $agent"
                          agents=("${agents[@]/$agent/}")
                      fi
                  done
              fi

              # Remove empty entries
              filtered=()
              for a in "${agents[@]}"; do
                  [ -n "$a" ] && filtered+=("$a")
              done
              agents=("${filtered[@]}")

              if [ ${#agents[@]} -eq 0 ]; then
                  echo "No agents to run — no matching file changes."
                  echo 'matrix=[]' >> "$GITHUB_OUTPUT"
                  echo 'has-agents=false' >> "$GITHUB_OUTPUT"
                  exit 0
              fi

              # Build JSON array
              matrix=$(printf '%s\n' "${agents[@]}" | jq -R . | jq -sc .)
          fi

          echo "Agent matrix: $matrix"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "has-agents=true" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────────
  # Phase 2: Run each agent in parallel
  # ──────────────────────────────────────────────────────────────────────
  review:
    needs: detect
    if: needs.detect.outputs.has-agents == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        agent: ${{ fromJson(needs.detect.outputs.matrix) }}

    concurrency:
      group: ${{ matrix.agent }}-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout org-level agents
        uses: actions/checkout@v4
        with:
          repository: norconsult-digital/.github
          path: .org-agents-repo
          sparse-checkout: agents
        continue-on-error: true

      - name: Flatten org agents directory
        shell: bash
        run: |
          # Move org agents to a predictable path, handle missing gracefully
          if [ -d ".org-agents-repo/agents" ]; then
              mv .org-agents-repo/agents .org-agents
              echo "✅ Org-level agents available in .org-agents/"
              ls -la .org-agents/
          else
              mkdir -p .org-agents
              echo "⚠️ No org-level agents found — using repo-level only."
          fi
          rm -rf .org-agents-repo

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"

      - name: Resolve agent configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail
          agent="${{ matrix.agent }}"

          # ── Agent-specific defaults ──
          case "$agent" in
            dotnet-security-reviewer)
              echo "file-filter=\.cs$"                                            >> "$GITHUB_OUTPUT"
              echo "title=Backend Security Review"                                >> "$GITHUB_OUTPUT"
              echo "emoji=🛡️"                                                    >> "$GITHUB_OUTPUT"
              echo "subtitle=Attacker perspective — injection, tenant isolation, authorization, secrets." >> "$GITHUB_OUTPUT"
              echo "task=Review the changes for security issues. Perspective: think like an **attacker** — what can be exploited?" >> "$GITHUB_OUTPUT"
              cat > /tmp/reporting-rules.txt <<'RULES'
          - Only report REAL security issues (input validation, authorization, injection, tenant isolation, secret/PII exposure, error handling, deserialization). Skip stylistic remarks.
          - Do NOT report runtime/scaling issues (covered by dotnet-runtime-safety-reviewer).
          - Use severity values: "critical" | "high" | "medium" | "low" | "info".
          RULES
              ;;
            dotnet-runtime-safety-reviewer)
              echo "file-filter=\.cs$"                                            >> "$GITHUB_OUTPUT"
              echo "title=Runtime Safety Review"                                  >> "$GITHUB_OUTPUT"
              echo "emoji=🧭"                                                    >> "$GITHUB_OUTPUT"
              echo "subtitle=Production-load perspective — statelessness, idempotency, retry storms, health probes." >> "$GITHUB_OUTPUT"
              echo "task=Review the changes for distributed-system / Kubernetes runtime hazards. Perspective: think like **production under load** — N replicas, at-least-once messaging." >> "$GITHUB_OUTPUT"
              cat > /tmp/reporting-rules.txt <<'RULES'
          - Only report issues matching the runtime-safety categories (statelessness, idempotency, outbox, retry, health probes, fire-and-forget, data protection, config validation).
          - Skip security/authz/IDOR (covered by dotnet-security-reviewer).
          - Be conservative: if unsure, do NOT report. False positives erode trust.
          RULES
              ;;
            frontend-security-reviewer)
              echo "file-filter=\.(ts|tsx|html)$"                                 >> "$GITHUB_OUTPUT"
              echo "title=Frontend Security Review"                               >> "$GITHUB_OUTPUT"
              echo "emoji=🔒"                                                    >> "$GITHUB_OUTPUT"
              echo "subtitle=XSS, injection, sanitization, auth guards, sensitive data handling." >> "$GITHUB_OUTPUT"
              echo "task=Review the changes for frontend security issues. Perspective: think like an **attacker** — what can be exploited in the browser?" >> "$GITHUB_OUTPUT"
              cat > /tmp/reporting-rules.txt <<'RULES'
          - Only report REAL security issues (XSS, injection, auth bypass, sensitive data exposure).
          - Skip framework conventions, styling, performance without security impact.
          - Skip npm package vulnerabilities (covered by Dependabot).
          RULES
              ;;
            *)
              echo "::error::Unknown agent: $agent"
              exit 1
              ;;
          esac

          # ── Resolve agent definition files (LAYERED: org + repo) ──
          #
          # The workflow supports a merge model where BOTH the org-level agent
          # AND a repo-level agent are included in the prompt:
          #
          #   1. Org-level agent  → universal rules (from .github/agents/)
          #      Checked out in a previous step from norconsult-digital/.github
          #   2. Repo-level agent → project-specific rules (from .github/agents/)
          #
          # If both exist, they are concatenated (org first, repo second).
          # Repo-level rules take priority when they conflict with org-level rules.
          # If only one exists, that one is used alone.
          #
          org_agent_file=".org-agents/${agent}.agent.md"
          repo_agent_file=".github/agents/${agent}.agent.md"

          has_org="false"
          has_repo="false"

          if [ -f "$org_agent_file" ]; then
              has_org="true"
              echo "✅ Found org-level agent: $org_agent_file"
          fi

          if [ -f "$repo_agent_file" ]; then
              has_repo="true"
              echo "✅ Found repo-level agent: $repo_agent_file"
          fi

          echo "has-org-agent=$has_org"   >> "$GITHUB_OUTPUT"
          echo "has-repo-agent=$has_repo" >> "$GITHUB_OUTPUT"
          echo "org-agent-file=$org_agent_file"   >> "$GITHUB_OUTPUT"
          echo "repo-agent-file=$repo_agent_file" >> "$GITHUB_OUTPUT"

          if [ "$has_org" = "false" ] && [ "$has_repo" = "false" ]; then
              echo "::warning::No agent file found for ${agent} — will rely on built-in prompt only."
          fi

      - name: Compute changed files
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          git fetch --no-tags --depth=1 origin "$base" || true

          file_filter='${{ steps.config.outputs.file-filter }}'
          mapfile -t files < <(git diff --name-only "$base" "$head" \
              | grep -E "$file_filter" || true)

          printf 'Changed files for %s (%s):\n' "${{ matrix.agent }}" "${#files[@]}"
          printf ' - %s\n' "${files[@]:-<none>}"

          {
              echo "count=${#files[@]}"
              echo "files<<EOF"
              printf '%s\n' "${files[@]:-}"
              echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "${#files[@]}" -gt 0 ]; then
              git diff "$base" "$head" -- "${files[@]}" > pr.diff
          else
              : > pr.diff
          fi

      - name: Skip if no matching changes
        if: steps.changes.outputs.count == '0'
        run: echo "No matching file changes for ${{ matrix.agent }} — skipping."

      - name: Check Copilot CLI token
        id: token-check
        if: steps.changes.outputs.count != '0'
        env:
          COPILOT_CLI_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
        run: |
          if [ -n "${COPILOT_CLI_TOKEN}" ]; then
              echo "available=true" >> "$GITHUB_OUTPUT"
          else
              echo "available=false" >> "$GITHUB_OUTPUT"
              echo "::warning::COPILOT_CLI_TOKEN not set — skipping ${{ matrix.agent }}."
          fi

      # ──────────────────────────────────────────────────────────────────
      # Convergence step 1/3: load this agent's ledger of OPEN findings
      # from its hidden sticky PR comment, so the model can re-validate them
      # BEFORE searching for new issues.
      # ──────────────────────────────────────────────────────────────────
      - name: Load open findings from ledger
        id: ledger
        if: steps.changes.outputs.count != '0' && steps.token-check.outputs.available == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          AGENT: ${{ matrix.agent }}
        run: |
          set -euo pipefail
          mkdir -p .agent-review

          cat > .agent-review/ledger-lib.mjs <<'LIB'
          // ── Shared ledger library (sticky-comment backed, per-agent) ──
          import { createHash } from "node:crypto";

          export const LEDGER_VERSION = 1;

          export function marker(agent) {
              return `<!-- agent-review-ledger:v${LEDGER_VERSION}:${agent} -->`;
          }
          export function fpMarker(hash) { return `<!-- agent-fp:${hash} -->`; }

          export function norm(s) {
              return String(s ?? "").trim().toLowerCase().replace(/\s+/g, " ");
          }
          // Identity is owned by the workflow, never the line number.
          export function fingerprint(agent, f) {
              const key = [agent, norm(f.ruleId), norm(f.file), norm(f.symbol), norm(f.evidenceAnchor)].join("|");
              return createHash("sha256").update(key).digest("hex").slice(0, 16);
          }

          export function api(repo) { return `https://api.github.com/repos/${repo}`; }
          export function headers(token, ua) {
              return {
                  Accept: "application/vnd.github+json",
                  Authorization: `Bearer ${token}`,
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
                  "User-Agent": ua || "agent-review-bot",
              };
          }
          export async function ghGet(url, h) {
              const r = await fetch(url, { headers: h });
              const t = await r.text();
              if (!r.ok) throw new Error(`GET ${url} -> ${r.status}: ${t}`);
              return t ? JSON.parse(t) : {};
          }
          export async function ghSend(method, url, h, body) {
              const r = await fetch(url, { method, headers: h, body: JSON.stringify(body) });
              const t = await r.text();
              if (!r.ok) throw new Error(`${method} ${url} -> ${r.status}: ${t}`);
              return t ? JSON.parse(t) : {};
          }
          export async function gql(token, ua, query, variables) {
              const r = await fetch("https://api.github.com/graphql", {
                  method: "POST",
                  headers: headers(token, ua),
                  body: JSON.stringify({ query, variables }),
              });
              const t = await r.text();
              if (!r.ok) throw new Error(`GraphQL ${r.status}: ${t}`);
              const j = JSON.parse(t);
              if (j.errors) throw new Error(`GraphQL errors: ${JSON.stringify(j.errors)}`);
              return j.data;
          }

          // Locate (and parse) this agent's ledger sticky comment.
          // Returns { commentId, ledger }. ledger.findings is a map fp -> entry.
          export async function loadLedger({ repo, pr, agent, token, ua }) {
              const h = headers(token, ua);
              const mk = marker(agent);
              const empty = { version: 0, headSha: null, updatedAt: null, agent, findings: {} };
              let page = 1, found = null;
              while (true) {
                  const comments = await ghGet(`${api(repo)}/issues/${pr}/comments?per_page=100&page=${page}`, h);
                  if (!Array.isArray(comments) || comments.length === 0) break;
                  for (const c of comments) {
                      if (typeof c.body === "string" && c.body.includes(mk)) found = c;
                  }
                  if (comments.length < 100) break;
                  page++;
              }
              if (!found) return { commentId: null, ledger: empty };
              const m = found.body.match(/<!-- ledger-data\s+([A-Za-z0-9+/=]+)\s+-->/);
              if (!m) return { commentId: found.id, ledger: empty };
              try {
                  const json = Buffer.from(m[1], "base64").toString("utf8");
                  const parsed = JSON.parse(json);
                  parsed.findings = parsed.findings || {};
                  return { commentId: found.id, ledger: parsed };
              } catch {
                  return { commentId: found.id, ledger: empty };
              }
          }
          LIB

          cat > .agent-review/load-open.mjs <<'JS'
          import { writeFileSync } from "node:fs";
          import { loadLedger } from "./ledger-lib.mjs";
          const { GITHUB_TOKEN, PR_NUMBER, REPO, AGENT } = process.env;
          const { ledger } = await loadLedger({
              repo: REPO, pr: PR_NUMBER, agent: AGENT, token: GITHUB_TOKEN, ua: AGENT,
          });
          // Expose only OPEN findings to the model for re-validation.
          const open = Object.entries(ledger.findings || {})
              .filter(([, e]) => e.state === "open")
              .map(([fp, e]) => ({
                  fingerprint: fp,
                  ruleId: e.ruleId,
                  file: e.file,
                  symbol: e.symbol,
                  evidenceAnchor: e.evidenceAnchor,
                  severity: e.severity,
                  title: e.title,
              }));
          writeFileSync(".agent-review/open-findings.json", JSON.stringify(open, null, 2));
          console.log(`Loaded ${open.length} open finding(s) from ledger for ${AGENT}.`);
          JS

          node .agent-review/load-open.mjs || echo "[]" > .agent-review/open-findings.json
          test -f .agent-review/open-findings.json || echo "[]" > .agent-review/open-findings.json
          echo "open-count=$(node -e 'console.log(JSON.parse(require("fs").readFileSync(".agent-review/open-findings.json","utf8")).length)')" >> "$GITHUB_OUTPUT"

      - name: Install GitHub Copilot CLI
        if: steps.changes.outputs.count != '0' && steps.token-check.outputs.available == 'true'
        run: npm install -g @github/copilot

      - name: "Run agent: ${{ matrix.agent }}"
        if: steps.changes.outputs.count != '0' && steps.token-check.outputs.available == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
          CHANGED_FILES: ${{ steps.changes.outputs.files }}
        run: |
          set -euo pipefail
          mkdir -p .agent-review

          agent="${{ matrix.agent }}"
          org_agent_file="${{ steps.config.outputs.org-agent-file }}"
          repo_agent_file="${{ steps.config.outputs.repo-agent-file }}"
          has_org="${{ steps.config.outputs.has-org-agent }}"
          has_repo="${{ steps.config.outputs.has-repo-agent }}"

          # ── Build the agent definition section ──
          # Layered: org rules first (foundation), repo rules second (overrides)
          agent_section=""

          if [ "$has_org" = "true" ]; then
              org_md=$(cat "$org_agent_file")
              agent_section+="
          --- ORG-LEVEL RULES (universal — from .github/agents/) ---
          ${org_md}
          --- END ORG-LEVEL RULES ---
          "
          fi

          if [ "$has_repo" = "true" ]; then
              repo_md=$(cat "$repo_agent_file")
              agent_section+="
          --- REPO-LEVEL RULES (project-specific — from .github/agents/) ---
          These rules are specific to this repository. They EXTEND and may OVERRIDE
          the org-level rules above. When there is a conflict, repo-level rules win.
          ${repo_md}
          --- END REPO-LEVEL RULES ---
          "
          fi

          if [ -z "$agent_section" ]; then
              agent_section="No agent definition file found. Use built-in knowledge only."
          fi

          reporting_rules=$(cat /tmp/reporting-rules.txt)
          open_findings=$(cat .agent-review/open-findings.json 2>/dev/null || echo "[]")

          cat > .agent-review/prompt.md <<PROMPT
          You are operating as the **${agent}** agent. Follow these instructions:

          ${agent_section}

          ## Task
          ${{ steps.config.outputs.task }}

          Inputs:
          - The unified diff of changed files is in \`pr.diff\` at the repo root.
          - Changed files (newline-separated): see CHANGED_FILES env var.
          - You may read any file in the repo for context using your read/grep/glob tools.

          ## STEP 1 — Re-validate existing open findings FIRST (most important)
          Below is the ledger of findings already reported on this PR by a previous run.
          Your FIRST job is continuity, not re-discovery. For EACH entry, read the
          current code at that location and classify it:

          OPEN_FINDINGS_JSON:
          ${open_findings}

          For every entry above, emit one object in the \`revalidations\` array with the
          SAME \`fingerprint\` and a \`status\`:
          - "still-present" — the issue still exists in the current code.
          - "fixed"         — you verified the code no longer has this issue.
          - "uncertain"     — you cannot determine it from the current code.
          Be conservative: only use "fixed" when you have actually confirmed the fix by
          reading the code. If you are not sure, use "uncertain" — NEVER guess "fixed".

          ## STEP 2 — Find NEW issues
          After re-validation, look for additional issues in pr.diff that are NOT already
          in OPEN_FINDINGS_JSON. Report ALL of them in a single pass — do not defer issues
          to a future review. Evaluate the full rule catalogue from your agent rules above
          on every changed hunk.

          Reporting rules:
          ${reporting_rules}
          - Each NEW finding must reference a file path and line number that is part of an
            added or modified RIGHT-side line in pr.diff.
          - Every finding MUST carry a \`ruleId\` from your agent's closed rule catalogue,
            a \`symbol\` (the enclosing method/class/endpoint/type — NOT the line number),
            and an \`evidenceAnchor\` (a short, stable semantic anchor for the specific
            risky construct, e.g. the sink/callee, route, command/event type, or parameter,
            such as "Upload:formFile->BlobClient.UploadAsync"). These three fields define
            the finding's stable identity across pushes — keep them deterministic.
          - When both org-level and repo-level rules are present, repo-level rules
            take priority in case of conflict.

          ## Output contract
          Emit ONLY a JSON document on stdout, wrapped between these EXACT marker lines
          (each on its own line, no other text on those lines):

          <<<FINDINGS_JSON>>>
          {
            "summary": "<short markdown summary, max ~10 lines>",
            "revalidations": [
              { "fingerprint": "<from OPEN_FINDINGS_JSON>", "status": "still-present|fixed|uncertain", "reason": "<one line>" }
            ],
            "findings": [
              {
                "file": "path/from/repo/root",
                "line": 123,
                "ruleId": "<from your rule catalogue, e.g. SEC-IDOR or RUN-02-IDEMPOTENCY>",
                "symbol": "<enclosing method/class/endpoint/type>",
                "evidenceAnchor": "<short stable anchor for the specific risky construct>",
                "severity": "critical|high|medium|low|info",
                "title": "Short title",
                "message": "Detailed explanation including a concrete fix recommendation.",
                "fixPlan": [
                  "Step 1: short, imperative action",
                  "Step 2: ...",
                  "Step 3: 'Add or update the matching test'"
                ]
              }
            ],
            "remediationPlan": "<markdown block — copy-paste-ready prompt to fix ALL findings>"
          }
          <<<END_FINDINGS_JSON>>>

          If there are no existing findings and no new findings, emit:
          <<<FINDINGS_JSON>>>
          {"summary":"No issues found.","revalidations":[],"findings":[],"remediationPlan":""}
          <<<END_FINDINGS_JSON>>>

          The markers and the JSON between them are the only contract.
          PROMPT

          set +e
          copilot \
              --allow-all-tools \
              --no-color \
              -p "$(cat .agent-review/prompt.md)" \
              | tee .agent-review/agent-output.txt
          copilot_rc=$?
          set -e
          echo "copilot exit code: ${copilot_rc}"

          python3 - <<'PY'
          import json, re, pathlib, sys
          raw = pathlib.Path(".agent-review/agent-output.txt").read_text(encoding="utf-8", errors="replace")
          m = re.search(r"<<<FINDINGS_JSON>>>\s*(.*?)\s*<<<END_FINDINGS_JSON>>>", raw, re.DOTALL)
          out_path = pathlib.Path(".agent-review/findings.json")
          if not m:
              print("No JSON markers found — writing empty result.", file=sys.stderr)
              out_path.write_text(json.dumps({"summary": "Agent did not produce structured output.", "revalidations": [], "findings": []}))
              sys.exit(0)
          payload = m.group(1).strip()
          try:
              parsed = json.loads(payload)
          except json.JSONDecodeError as e:
              print(f"JSON parse error: {e}.", file=sys.stderr)
              out_path.write_text(json.dumps({"summary": f"Agent produced invalid JSON: {e}", "revalidations": [], "findings": []}))
              sys.exit(0)
          parsed.setdefault("revalidations", [])
          parsed.setdefault("findings", [])
          out_path.write_text(json.dumps(parsed, indent=2))
          print(f"Wrote {len(parsed.get('findings', []))} new finding(s), {len(parsed.get('revalidations', []))} revalidation(s) to {out_path}")
          PY

          echo "--- findings.json ---"
          cat .agent-review/findings.json

      # ──────────────────────────────────────────────────────────────────
      # Convergence step 2/3 + 3/3: post ONLY new findings, resolve threads
      # the model confirmed as fixed, and write the merged ledger back with
      # optimistic concurrency.
      # ──────────────────────────────────────────────────────────────────
      - name: Post review to pull request
        if: steps.changes.outputs.count != '0' && steps.token-check.outputs.available == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          AGENT: ${{ matrix.agent }}
        run: |
          set -euo pipefail
          cat > .agent-review/post-review.mjs <<'SCRIPT'
          import { readFileSync, existsSync } from "node:fs";
          import {
              marker, fpMarker, fingerprint, api, headers, ghGet, ghSend, gql, loadLedger,
          } from "./ledger-lib.mjs";

          const { GITHUB_TOKEN, PR_NUMBER, REPO, COMMIT_SHA, AGENT } = process.env;
          const title = process.argv[2] || "Agent Review";
          const emoji = process.argv[3] || "⚠️";
          const subtitle = process.argv[4] || "";
          const agent = AGENT || process.argv[5] || "automated-reviewer";
          const ua = agent;

          if (!GITHUB_TOKEN || !PR_NUMBER || !REPO || !COMMIT_SHA) {
              console.error("Missing env vars"); process.exit(1);
          }

          const findingsPath = ".agent-review/findings.json";
          if (!existsSync(findingsPath)) { console.log("No findings.json."); process.exit(0); }
          let payload;
          try { payload = JSON.parse(readFileSync(findingsPath, "utf8")); }
          catch (e) { console.error(e.message); process.exit(1); }

          const summary = payload.summary?.trim() || `${title} complete.`;
          const newFindings = Array.isArray(payload.findings) ? payload.findings : [];
          const revalidations = Array.isArray(payload.revalidations) ? payload.revalidations : [];
          const remediationPlan = (payload.remediationPlan || "").trim();
          const SEV = { critical: "🔴", high: "🟠", medium: "🟡", low: "🔵", info: "ℹ️" };
          const h = headers(GITHUB_TOKEN, ua);

          // ── 1. Load ledger (authoritative state from previous runs) ──
          let { commentId: ledgerCommentId, ledger } = await loadLedger({
              repo: REPO, pr: PR_NUMBER, agent, token: GITHUB_TOKEN, ua,
          });
          ledger.findings = ledger.findings || {};
          console.log(`Ledger: ${Object.keys(ledger.findings).length} known finding(s), version ${ledger.version || 0}.`);

          // ── 2. Index existing inline comments by their hidden fp marker ──
          // This makes dedup self-healing even if the ledger comment was lost.
          const postedFps = new Set();
          try {
              let page = 1;
              while (true) {
                  const comments = await ghGet(`${api(REPO)}/pulls/${PR_NUMBER}/comments?per_page=100&page=${page}`, h);
                  if (!Array.isArray(comments) || comments.length === 0) break;
                  for (const c of comments) {
                      const m = typeof c.body === "string" && c.body.match(/<!-- agent-fp:([0-9a-f]+) -->/);
                      if (m) postedFps.add(m[1]);
                  }
                  if (comments.length < 100) break;
                  page++;
              }
          } catch (e) { console.warn(`Could not list review comments: ${e.message}`); }

          // ── 3. Apply revalidations to ledger (conservative resolution) ──
          const revById = new Map();
          for (const r of revalidations) if (r?.fingerprint) revById.set(r.fingerprint, r);

          let resolvedCount = 0;
          for (const [fp, entry] of Object.entries(ledger.findings)) {
              if (entry.state !== "open") continue;
              const r = revById.get(fp);
              if (r && r.status === "fixed") {
                  entry.state = "resolved";
                  entry.resolvedAtSha = COMMIT_SHA;
                  entry.missingRuns = 0;
                  resolvedCount++;
                  if (entry.threadId) {
                      try {
                          await gql(GITHUB_TOKEN, ua,
                              `mutation($id:ID!){ resolveReviewThread(input:{threadId:$id}){ thread { isResolved } } }`,
                              { id: entry.threadId });
                      } catch (e) { console.warn(`resolveReviewThread failed for ${fp}: ${e.message}`); }
                  }
              } else if (r && r.status === "still-present") {
                  entry.lastSeenSha = COMMIT_SHA; entry.lastCheckedSha = COMMIT_SHA; entry.missingRuns = 0;
              } else if (r && r.status === "uncertain") {
                  entry.lastCheckedSha = COMMIT_SHA; entry.missingRuns = 0;
              } else {
                  // Not mentioned by the model this run → do NOT resolve. Just count.
                  entry.missingRuns = (entry.missingRuns || 0) + 1;
                  entry.lastCheckedSha = COMMIT_SHA;
              }
          }

          // ── 4. Post genuinely-new findings only ──
          const inlineComments = [];
          const fallbackBullets = [];
          let skippedDupes = 0;

          for (const f of newFindings) {
              if (!f?.file || !f?.line || !f?.ruleId) { fallbackBullets.push(fmtBullet(f)); continue; }
              const fp = fingerprint(agent, f);
              const known = ledger.findings[fp];
              // Skip if already posted (ledger says open, or a live comment carries the marker).
              if ((known && known.state === "open") || postedFps.has(fp)) {
                  skippedDupes++;
                  if (known) { known.lastSeenSha = COMMIT_SHA; known.lastCheckedSha = COMMIT_SHA; known.missingRuns = 0; }
                  else ledger.findings[fp] = mkEntry(agent, f, fp, "open");
                  continue;
              }
              const s = SEV[f.severity?.toLowerCase()] ?? "⚠️";
              let body = `${s} **${(f.severity || "info").toUpperCase()}: ${f.title || "Finding"}**\n\n${f.message || ""}`;
              if (Array.isArray(f.fixPlan) && f.fixPlan.length)
                  body += "\n\n<details><summary>🛠️ Fix plan</summary>\n\n" + f.fixPlan.map((x, i) => `${i + 1}. ${x}`).join("\n") + "\n\n</details>";
              body += `\n\n${fpMarker(fp)}`;
              inlineComments.push({ path: f.file, line: Number(f.line), side: "RIGHT", body, _fp: fp, _f: f });
          }

          function mkEntry(agent, f, fp, state) {
              return {
                  agent, ruleId: f.ruleId, file: f.file, symbol: f.symbol || "",
                  evidenceAnchor: f.evidenceAnchor || "", severity: f.severity || "info",
                  title: f.title || "", state, commentId: null, threadId: null,
                  firstSeenSha: COMMIT_SHA, lastSeenSha: COMMIT_SHA, lastCheckedSha: COMMIT_SHA,
                  resolvedAtSha: null, missingRuns: 0,
              };
          }
          function fmtBullet(f) {
              const s = SEV[f?.severity?.toLowerCase()] ?? "⚠️";
              const loc = f?.file ? ` \`${f.file}${f.line ? ":" + f.line : ""}\`` : "";
              return `- ${s} **${(f?.severity || "info").toUpperCase()}**${loc}: ${f?.title || ""} — ${f?.message || ""}`;
          }

          // ── 5. Post the review (only if there is something new to say) ──
          const openCount = Object.values(ledger.findings).filter((e) => e.state === "open").length + inlineComments.length;
          const hdr = [`## ${emoji} ${title}`, ""];
          if (subtitle) hdr.push(`_${subtitle}_`, "");
          hdr.push(summary, "");
          const counters = [
              `**New:** ${inlineComments.length}`,
              `**Open (total):** ${openCount}`,
              resolvedCount ? `**Resolved:** ${resolvedCount}` : null,
              skippedDupes ? `**Unchanged:** ${skippedDupes}` : null,
          ].filter(Boolean).join(" · ");
          hdr.push(counters);
          let body = hdr.join("\n");
          if (fallbackBullets.length) body += "\n\n### Additional findings\n" + fallbackBullets.join("\n");
          if (remediationPlan && inlineComments.length)
              body += "\n---\n\n<details><summary>📋 <strong>Remediation plan</strong></summary>\n\n````markdown\n" + remediationPlan + "\n````\n\n</details>";

          async function postReview(reviewBody, comments) {
              return ghSend("POST", `${api(REPO)}/pulls/${PR_NUMBER}/reviews`, h,
                  { commit_id: COMMIT_SHA, event: "COMMENT", body: reviewBody, comments });
          }

          if (inlineComments.length || fallbackBullets.length) {
              try {
                  await postReview(body, inlineComments.map(({ path, line, side, body }) => ({ path, line, side, body })));
                  console.log(`Posted ${inlineComments.length} new inline comment(s).`);
              } catch (e) {
                  console.warn(`Inline review failed: ${e.message}. Falling back to summary-only.`);
                  const all = inlineComments.map((c) => `- \`${c.path}:${c._f.line}\` — ${c._f.title}`).concat(fallbackBullets);
                  await postReview(`${body}\n\n### All findings\n${all.join("\n")}`, []);
              }
          } else {
              console.log("Nothing new to post (convergence reached).");
          }

          // ── 6. Resolve thread IDs for newly posted comments + record in ledger ──
          for (const c of inlineComments) ledger.findings[c._fp] = mkEntry(agent, c._f, c._fp, "open");
          await attachThreadIds(ledger, agent);

          // ── 7. Write merged ledger back (optimistic concurrency) ──
          await persistLedger();

          async function attachThreadIds(ledger, agent) {
              // Map fp -> review thread node id via GraphQL, by scanning comment bodies for the fp marker.
              try {
                  const data = await gql(GITHUB_TOKEN, ua, `
                      query($owner:String!,$name:String!,$number:Int!){
                        repository(owner:$owner,name:$name){
                          pullRequest(number:$number){
                            reviewThreads(first:100){
                              nodes { id isResolved comments(first:20){ nodes { databaseId body } } }
                            }
                          }
                        }
                      }`,
                      { owner: REPO.split("/")[0], name: REPO.split("/")[1], number: Number(PR_NUMBER) });
                  const threads = data?.repository?.pullRequest?.reviewThreads?.nodes || [];
                  for (const t of threads) {
                      for (const cm of (t.comments?.nodes || [])) {
                          const m = typeof cm.body === "string" && cm.body.match(/<!-- agent-fp:([0-9a-f]+) -->/);
                          if (m && ledger.findings[m[1]]) {
                              ledger.findings[m[1]].threadId = t.id;
                              if (ledger.findings[m[1]].commentId == null) ledger.findings[m[1]].commentId = cm.databaseId;
                          }
                      }
                  }
              } catch (e) { console.warn(`attachThreadIds failed: ${e.message}`); }
          }

          async function persistLedger() {
              // Re-fetch immediately before writing to honour optimistic concurrency,
              // then MERGE rather than overwrite.
              const fresh = await loadLedger({ repo: REPO, pr: PR_NUMBER, agent, token: GITHUB_TOKEN, ua });
              const base = fresh.ledger?.findings || {};
              for (const [fp, entry] of Object.entries(ledger.findings)) {
                  const prior = base[fp];
                  if (!prior) { base[fp] = entry; continue; }
                  // Prefer the most progressed state; never downgrade resolved -> open.
                  if (prior.state === "resolved" && entry.state === "open") { base[fp] = prior; continue; }
                  base[fp] = { ...prior, ...entry, threadId: entry.threadId || prior.threadId, commentId: entry.commentId ?? prior.commentId };
              }
              const merged = {
                  version: (fresh.ledger?.version || 0) + 1,
                  headSha: COMMIT_SHA,
                  updatedAt: new Date().toISOString(),
                  agent,
                  findings: base,
              };
              const open = Object.values(base).filter((e) => e.state === "open").length;
              const resolved = Object.values(base).filter((e) => e.state === "resolved").length;
              const data = Buffer.from(JSON.stringify(merged)).toString("base64");
              const bodyMd = [
                  marker(agent),
                  `<!-- This is an automated, machine-managed ledger for ${agent}. Do not edit by hand. -->`,
                  ``,
                  `### ${emoji} ${title} — finding ledger`,
                  ``,
                  `_Tracks findings across pushes so each issue is reported once and resolved when fixed._`,
                  ``,
                  `**Open:** ${open} · **Resolved:** ${resolved} · **Updated:** ${merged.updatedAt} · **version** ${merged.version}`,
                  ``,
                  `<!-- ledger-data ${data} -->`,
              ].join("\n");

              const target = fresh.commentId || ledgerCommentId;
              if (target) {
                  await ghSend("PATCH", `${api(REPO)}/issues/comments/${target}`, h, { body: bodyMd });
                  console.log(`Updated ledger comment ${target} (open=${open}, resolved=${resolved}).`);
              } else {
                  const created = await ghSend("POST", `${api(REPO)}/issues/${PR_NUMBER}/comments`, h, { body: bodyMd });
                  console.log(`Created ledger comment ${created.id} (open=${open}, resolved=${resolved}).`);
              }
          }
          SCRIPT

          node .agent-review/post-review.mjs \
              "${{ steps.config.outputs.title }}" \
              "${{ steps.config.outputs.emoji }}" \
              "${{ steps.config.outputs.subtitle }}" \
              "${{ matrix.agent }}"

      - name: Upload findings artifact
        if: always() && steps.changes.outputs.count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.agent }}-findings"
          path: .agent-review/findings.json
          if-no-files-found: ignore
