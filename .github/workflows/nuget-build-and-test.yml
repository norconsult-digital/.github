name: Nuget Build And Test

on:
  workflow_call:
    inputs:
      vmImage:
        required: false
        type: string
        default: "ubuntu-latest"
      projectDir:
        required: true
        type: string
      buildConfiguration:
        required: true
        type: string
      dotnetVersion:
        required: false
        default: "8.*"
        type: string
      nugetConfigPath:
        required: false
        type: string
        default: "nuget-config/NuGet.Config"
    secrets:
      ADO_NUGET_PAT:
        required: true

jobs:
  build-and-test:
    runs-on: ${{ inputs.vmImage }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup dotnet ${{ inputs.dotnetVersion }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnetVersion }}

      - name: Validate nugetConfigPath is workspace-relative
        shell: pwsh
        run: |
          $nugetConfigPath = "${{ inputs.nugetConfigPath }}"
          if ([System.IO.Path]::IsPathRooted($nugetConfigPath)) {
            throw "inputs.nugetConfigPath must be workspace-relative (no leading / or \\)."
          }

      - name: Replace ADO Nuget feed token in NuGet.Config
        shell: pwsh
        run: |
          $nugetConfig = Join-Path $env:GITHUB_WORKSPACE "${{ inputs.nugetConfigPath }}"
          $content = Get-Content -Path $nugetConfig -Raw
          $content = $content.Replace('<add key="ClearTextPassword" value="password" />', '<add key="ClearTextPassword" value="${{ secrets.ADO_NUGET_PAT }}" />')
          Set-Content -Path $nugetConfig -Value $content

      - name: Restore dependencies
        shell: pwsh
        run: |
          $projectRoot = Join-Path $env:GITHUB_WORKSPACE "${{ inputs.projectDir }}"
          Get-ChildItem -Path $projectRoot -Recurse -Filter *.csproj | ForEach-Object {
            dotnet restore $_.FullName --configfile (Join-Path $env:GITHUB_WORKSPACE "${{ inputs.nugetConfigPath }}")
          }

      - name: Build
        shell: pwsh
        run: |
          $projectRoot = Join-Path $env:GITHUB_WORKSPACE "${{ inputs.projectDir }}"
          Get-ChildItem -Path $projectRoot -Recurse -Filter *.csproj | ForEach-Object {
            dotnet build $_.FullName --configuration ${{ inputs.buildConfiguration }} --no-restore
          }

      - name: Run tests
        shell: pwsh
        run: |
          $projectRoot = Join-Path $env:GITHUB_WORKSPACE "${{ inputs.projectDir }}"
          Get-ChildItem -Path $projectRoot -Recurse -Include '*Tests.csproj', '*tests.csproj' | ForEach-Object {
            dotnet test $_.FullName --configuration ${{ inputs.buildConfiguration }} --no-build --no-restore
          }

      - name: Publish nuget sources
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: nuget-sources
          path: ${{ github.workspace }}/**
