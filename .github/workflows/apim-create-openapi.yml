name: Export OpenAPI Specification

on:
  workflow_call:
    inputs:
      apiProjectPath:
        description: 'Path to the API project (e.g., admin/src/api/Admin.csproj)'
        required: true
        type: string
      apiName:
        description: 'Name of the API for the output file (e.g., bim-admin-api)'
        required: true
        type: string
      dotnetVersion:
        description: '.NET SDK version (default: 10.*)'
        required: false
        type: string
        default: '10.*'
      outputPath:
        description: 'Output path for the OpenAPI spec (default: docs/api-specs)'
        required: false
        type: string
        default: 'docs/api-specs'
      swaggerPath:
        description: 'Relative swagger endpoint exposed by the API (default: /swagger/v1/swagger.json)'
        required: false
        type: string
        default: '/swagger/v1/swagger.json'

jobs:
  export-openapi:
    name: Export OpenAPI Specification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnetVersion }}

      - name: Restore and Build
        run: |
          dotnet restore ${{ inputs.apiProjectPath }}
          dotnet build ${{ inputs.apiProjectPath }} -c Release --no-restore

      - name: Generate OpenAPI Spec by running API
        shell: pwsh
        env:
          API_PROJECT_PATH: ${{ inputs.apiProjectPath }}
          API_NAME: ${{ inputs.apiName }}
          OUTPUT_PATH: ${{ inputs.outputPath }}
          SWAGGER_PATH: ${{ inputs.swaggerPath }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          Write-Host "📦 Project: $env:API_PROJECT_PATH"
          Write-Host "📄 Output dir: $env:OUTPUT_PATH"
          Write-Host "📑 Swagger path: $env:SWAGGER_PATH"

          # Ensure output directory exists
          New-Item -ItemType Directory -Path $env:OUTPUT_PATH -Force | Out-Null
          $outputFile = Join-Path $env:OUTPUT_PATH "$($env:API_NAME)-openapi.json"

          $projectPath = $env:API_PROJECT_PATH
          $projectDir = Split-Path $projectPath -Parent
          $launchSettingsPath = Join-Path $projectDir "Properties/launchSettings.json"

          # Detect port from launchSettings.json if available
          $port = 5001
          if (Test-Path $launchSettingsPath) {
            try {
              $launch = Get-Content $launchSettingsPath -Raw | ConvertFrom-Json
              $profile = $launch.profiles.PSObject.Properties | Where-Object { $_.Value.applicationUrl -match 'http://localhost:(\d+)' } | Select-Object -First 1
              if ($profile -and $profile.Value.applicationUrl -match 'http://localhost:(\d+)') {
                $port = [int]$Matches[1]
                Write-Host "Detected port from launchSettings.json: $port"
              }
            }
            catch {
              Write-Host "Could not parse launchSettings.json, using default port 5001"
            }
          }

          # Run the API with minimal env so it can start without cloud deps
          $env:ASPNETCORE_ENVIRONMENT = 'Development'
          $env:SKIP_MIGRATIONS = 'true'
          $env:SWAGGER_ONLY = 'true'
          $env:ASPNETCORE_URLS = "http://localhost:$port"
          $env:BlobStorageName = ''
          $env:Azure__KeyVault__VaultUri = ''
          $env:ConnectionStrings__SqlServer = 'Server=localhost;Database=dummy;User Id=dummy;Password=dummy;TrustServerCertificate=True'

          Write-Host "Starting API on http://localhost:$port ..."
          $process = Start-Process -FilePath 'dotnet' -ArgumentList "run --no-build -c Release --project `"$projectPath`"" -PassThru -NoNewWindow

          try {
            $maxAttempts = 45
            $attempt = 0
            $ready = $false
            $swaggerUrl = "http://localhost:$port$($env:SWAGGER_PATH)"

            while (-not $ready -and $attempt -lt $maxAttempts) {
              $attempt++
              Start-Sleep -Seconds 1
              try {
                $response = Invoke-WebRequest -Uri $swaggerUrl -TimeoutSec 2 -UseBasicParsing -ErrorAction Stop
                if ($response.StatusCode -eq 200) {
                  $ready = $true
                  Write-Host "✅ API is ready (attempt $attempt)"
                }
              }
              catch {
                Write-Host "Waiting for API... ($attempt/$maxAttempts)" -ForegroundColor Gray
              }
            }

            if (-not $ready) {
              throw "API did not become ready within $maxAttempts seconds"
            }

            Write-Host "Downloading OpenAPI from $swaggerUrl"
            $spec = Invoke-RestMethod -Uri $swaggerUrl -TimeoutSec 5
            $json = $spec | ConvertTo-Json -Depth 100

            # Remove nullable flags to appease APIM import quirks
            $json = $json -replace '(?m)^\s*"nullable"\s*:\s*(true|false)\s*,?\s*$', ''
            $json = $json -replace ',\s*,', ','
            $json = $json -replace ',(\s*[}\]])', '$1'

            $json | Set-Content -Path $outputFile -Encoding utf8
            Write-Host "✅ Saved OpenAPI to $outputFile"

            # Basic info output
            try {
              $info = $spec.info
              $pathsCount = $spec.paths.PSObject.Properties.Count
              Write-Host "Info: title=$($info.title) version=$($info.version) paths=$pathsCount"
            }
            catch {}
          }
          finally {
            if ($process -and -not $process.HasExited) {
              Write-Host "Stopping API (PID $($process.Id))"
              Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            }
          }

          # Validate JSON
          jq empty $outputFile
          if ($LASTEXITCODE -ne 0) {
            Write-Host "❌ OpenAPI spec failed JSON validation" -ForegroundColor Red
            cat $outputFile
            exit 1
          }
          Write-Host "✅ OpenAPI spec JSON validated"

      - name: Upload OpenAPI Spec as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.apiName }}-openapi
          path: ${{ inputs.outputPath }}/${{ inputs.apiName }}-openapi.json
          retention-days: 14
