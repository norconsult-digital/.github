name: Nuget Publish

on:
  workflow_call:
    inputs:
      vmImage:
        required: false
        type: string
        default: "ubuntu-latest"
      environment:
        required: true
        type: string
      environmentName:
        required: true
        type: string
      projectDir:
        required: true
        type: string
      buildConfiguration:
        required: true
        type: string
      deployAllEnvironments:
        required: false
        type: boolean
        default: false
      dotnetVersion:
        required: false
        default: "8.*"
        type: string
      nugetConfigPath:
        required: false
        type: string
        default: "nuget-config/NuGet.Config"
    secrets:
      ADO_NUGET_PAT:
        required: true
      NUGET_GITHUB_PAT:
        required: false

jobs:
  deploy:
    runs-on: ${{ inputs.vmImage }}
    if: ${{ inputs.deployAllEnvironments == true || ((contains(github.ref_name, 'main') || contains(github.ref_name, 'release')) && ((contains(github.ref_name, 'main') && inputs.environmentName == 'test') || (!contains(github.ref_name, 'main') && (inputs.environmentName == 'stage' || inputs.environmentName == 'prod')))) }}
    environment: ${{ inputs.environment }}
    steps:
      - name: Download nuget sources
        uses: actions/download-artifact@v5
        with:
          name: nuget-sources
          path: ${{ github.workspace }}/nuget-sources

      - name: Setup dotnet ${{ inputs.dotnetVersion }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnetVersion }}

      - name: Validate nugetConfigPath and projectDir are workspace-relative
        shell: pwsh
        run: |
          $sourcesRoot = (Resolve-Path (Join-Path $env:GITHUB_WORKSPACE "nuget-sources")).Path
          function Get-ValidatedPath([string]$basePath, [string]$relativePath, [string]$inputName) {
            if ([System.IO.Path]::IsPathRooted($relativePath)) {
              throw "$inputName must be workspace-relative (no leading / or \\)."
            }
            $candidate = Join-Path $basePath $relativePath
            $resolved = (Resolve-Path $candidate -ErrorAction Stop).Path
            if (-not $resolved.StartsWith($basePath, [System.StringComparison]::OrdinalIgnoreCase)) {
              throw "$inputName must resolve within $basePath."
            }
            return $resolved
          }

          Get-ValidatedPath $sourcesRoot "${{ inputs.nugetConfigPath }}" "inputs.nugetConfigPath" | Out-Null
          Get-ValidatedPath $sourcesRoot "${{ inputs.projectDir }}" "inputs.projectDir" | Out-Null

      - name: Set environment-specific variables
        shell: pwsh
        run: |
          switch ("${{ inputs.environmentName }}") {
            "test" {
              "preLabel=dev" | Out-File -FilePath $env:GITHUB_ENV -Append
              "addVersionSuffix=true" | Out-File -FilePath $env:GITHUB_ENV -Append
            }
            "stage" {
              "preLabel=rc" | Out-File -FilePath $env:GITHUB_ENV -Append
              "addVersionSuffix=true" | Out-File -FilePath $env:GITHUB_ENV -Append
            }
            "prod" {
              "preLabel=" | Out-File -FilePath $env:GITHUB_ENV -Append
              "addVersionSuffix=false" | Out-File -FilePath $env:GITHUB_ENV -Append
            }
            default {
              throw "inputs.environmentName must be one of: test, stage, prod."
            }
          }

      - name: Set version suffix
        if: ${{ env.addVersionSuffix == 'true' }}
        shell: pwsh
        run: |
          $date = Get-Date -Format "yyyyMMdd-HHmmss"
          "isy_versionSuffix=${{ env.preLabel }}-$date" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create temporary NuGet.Config with ADO feed token
        shell: pwsh
        run: |
          $sourceConfig = Join-Path (Join-Path $env:GITHUB_WORKSPACE "nuget-sources") "${{ inputs.nugetConfigPath }}"
          $content = Get-Content -Path $sourceConfig -Raw
          $content = $content.Replace('<add key="ClearTextPassword" value="password" />', '<add key="ClearTextPassword" value="${{ secrets.ADO_NUGET_PAT }}" />')
          $tempConfig = Join-Path $env:RUNNER_TEMP "NuGet.Config"
          Set-Content -Path $tempConfig -Value $content
          "NUGET_CONFIG_TEMP=$tempConfig" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Restore dependencies
        shell: pwsh
        run: |
          $projectRoot = Join-Path (Join-Path $env:GITHUB_WORKSPACE "nuget-sources") "${{ inputs.projectDir }}"
          Get-ChildItem -Path $projectRoot -Recurse -Filter *.csproj | ForEach-Object {
            dotnet restore $_.FullName --configfile $env:NUGET_CONFIG_TEMP
          }

      - name: Dotnet Pack (with version suffix)
        if: ${{ env.addVersionSuffix == 'true' }}
        shell: pwsh
        run: |
          $projectRoot = Join-Path (Join-Path $env:GITHUB_WORKSPACE "nuget-sources") "${{ inputs.projectDir }}"
          Get-ChildItem -Path $projectRoot -Recurse -Filter *.csproj | ForEach-Object {
            $csproj = $_.FullName
            $versionSuffix = "${{ env.isy_versionSuffix }}"
            if (Select-String -Path $csproj -Pattern '<Version>.*\$\((VersionSuffix)\)</Version>' -Quiet) {
              $versionSuffix = "-$versionSuffix"
            }
            dotnet pack $csproj --configuration "${{ inputs.buildConfiguration }}" --no-restore --no-build --version-suffix "$versionSuffix" --output (Join-Path $env:GITHUB_WORKSPACE "nuget")
          }

      - name: Dotnet Pack (without version suffix)
        if: ${{ env.addVersionSuffix == 'false' }}
        shell: pwsh
        run: |
          $projectRoot = Join-Path (Join-Path $env:GITHUB_WORKSPACE "nuget-sources") "${{ inputs.projectDir }}"
          Get-ChildItem -Path $projectRoot -Recurse -Filter *.csproj | ForEach-Object {
            dotnet pack $_.FullName --configuration "${{ inputs.buildConfiguration }}" --no-restore --no-build --output (Join-Path $env:GITHUB_WORKSPACE "nuget")
          }

      - name: Dotnet Push to GitHub Packages
        shell: pwsh
        env:
          CUSTOM_TOKEN: ${{ secrets.NUGET_GITHUB_PAT }}
          DEFAULT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $token = if ([string]::IsNullOrWhiteSpace($env:CUSTOM_TOKEN)) { $env:DEFAULT_TOKEN } else { $env:CUSTOM_TOKEN }
          dotnet nuget push (Join-Path (Join-Path $env:GITHUB_WORKSPACE "nuget") "*.nupkg") `
            --source "https://nuget.pkg.github.com/norconsult-digital/index.json" `
            --api-key "$token" --skip-duplicate

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          source-url: https://pkgs.dev.azure.com/Norconsult-IS/_packaging/isy360-packages/nuget/v3/index.json
          dotnet-version: ${{ inputs.dotnetVersion }}
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.ADO_NUGET_PAT }}

      - name: Dotnet Push to Azure Artifacts
        shell: pwsh
        run: |
          dotnet nuget push --api-key AzureArtifacts (Join-Path (Join-Path $env:GITHUB_WORKSPACE "nuget") "*.nupkg") --skip-duplicate
